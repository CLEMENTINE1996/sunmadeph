name: Sync Google Drive and Deploy

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows you to click a button in GitHub to sync manually

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to "push" the new blog files to your repo
      pages: write      # Added for deployment
      id-token: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create Service Account File
        run: echo '${{ secrets.SUNMADE_SECRET }}' > service-account.json

      - name: Run Sync Script
        run: node sync-drive.js 

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blogs src/data  # Added src/data here
          git commit -m "Auto-sync: Content and Product updates" || echo "No changes"
          git push

      - name: Force Velite and Build
        run: |
          npx velite --clean
          npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # This must match your Next.js export directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4